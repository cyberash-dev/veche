name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Trusted Publishers OIDC requires npm CLI >= 11.5. Node 22 ships with npm 10.x;
          # Node 24 ships with npm 11.x — pick it up here without an in-place npm upgrade
          # (which can break arborist's dep tree on the runner).
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance
