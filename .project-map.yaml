project:
  name: veche
  language: typescript
  frameworks: []

root: .
respect_gitignore: true

exclude:
  - "node_modules/**"
  - "dist/**"
  - "build/**"
  - ".venv/**"
  - "venv/**"
  - "target/**"
  - "vendor/**"
  - ".git/**"
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/*.min.js"
  - "**/*.d.ts"
  - "**/__tests__/**"
  - "**/*.test.ts"
  - "**/*.spec.ts"

sections:
  - overview
  - contexts
  - entities
  - enums
  - endpoints
  - storage
  - interactions
  - workers
  - metadata

overview:
  path: .project-map/overview.md

contexts:
  custom: []
  auto:
    min_files: 10
    depth: 2
    known_roles:
      "actions": "Business actions / use-cases"
      "usecases": "Business actions / use-cases"
      "use-cases": "Business actions / use-cases"
      "features": "Vertical slice features"
      "domain": "Domain layer"
      "entities": "Domain entities"
      "models": "Domain models"
      "schemas": "API / serialization schemas"
      "dto": "Data transfer objects"
      "dtos": "Data transfer objects"
      "handlers": "HTTP handlers"
      "controllers": "HTTP handlers"
      "routes": "HTTP route definitions"
      "api": "API layer"
      "rest": "REST API layer"
      "storage": "Persistence layer"
      "repository": "Persistence layer"
      "repositories": "Persistence layer"
      "db": "Persistence layer"
      "infra": "Infrastructure adapters"
      "infrastructure": "Infrastructure adapters"
      "adapters": "Infrastructure adapters"
      "ports": "Hexagonal ports"
      "interactions": "External service clients"
      "clients": "External service clients"
      "integrations": "External service clients"
      "fsm": "Finite state machines"
      "workers": "Background jobs"
      "taskq": "Background jobs"
      "jobs": "Background jobs"
      "tasks": "Background jobs"
      "utils": "Utilities"
      "lib": "Utilities"
      "common": "Shared utilities"
      "core": "Core domain"

entities:
  top_n: 30
  include_fields: true
  include_private_methods: false
  importance:
    method_count: 0.5
    field_count: 0.3
    inbound_references: 1.0

enums:
  base_classes: [enum.Enum, Enum, IntEnum, StrEnum]

endpoints:
  framework: null
  routes_module: null
  app_var: null

storage:
  base_class: Base
  migrations_dir: null
  last_n: 10

interactions:
  dir: null

workers:
  patterns:
    - "class *Worker"
    - "@celery.task"
    - "@dramatiq.actor"

output:
  markdown: PROJECT_MAP.md
  json: null
